<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pag Store</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Lexend:wght@100..900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="./css/style.css">

</head>

<body>
    <div class="header-section">
        <header>
            <img src="./img/logo.svg" alt="">
            <nav>
                <a href="#">Games</a>
                <a href="#">Browse Games</a>
                <a href="#">Store</a>
            </nav>
            <div class="btns">
                <a href="#">Sing up</a>
                <a href="#">Login</a>
            </div>


        </header>

        <section id="hero">
            <h1>MultiVersus</h1>
            <p>Now officially free to play for all Xbox users.</p>
            <a href="#">Get in now</a>

        </section>

        <main>

            <section id="why-bidogames">
                <div class="title">

                    <h2>Why BigodeStore</h2>
                    <p>We are the official Xbox partner in Indonesia that
                        provides offical video games.
                    </p>
                </div>

                <div class="cards">

                    <div width="280px" class="card">
                        <img src="./img/control.svg" alt="">
                        <p>5000+ Video Games Available</p>
                    </div>
                    <div width="280px" class="card">
                        <img src="./img/check.svg" alt="">
                        <p>100% Offical</p>
                    </div>
                    <div width="280px" class="card">
                        <img src="./img/xbox.svg" alt="">
                        <p>Available for Xbox Consoles</p>
                    </div>

                </div>

            </section>

        </main>
    </div>
</body>

</html>
